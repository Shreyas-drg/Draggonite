<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper Scissors</title>
    <link rel="stylesheet" href="RPS_Styling.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
        <div class="choice" id="ROCK">
            <img src="https://pngimg.com/uploads/stone/stone_PNG13596.png"/>
        </div>
        <div class="choice" id="PAPER">
            <img src="https://i.pinimg.com/originals/00/e6/b7/00e6b7c79a73284d1f29875f0087171e.jpg"/>
        </div>
        <div class="choice" id="SCISSOR">
            <img src="https://th.bing.com/th/id/R.fa8dc10ff326af8f103506d6dc342352?rik=j4ULR70wcQ0ecA&riu=http%3a%2f%2fpluspng.com%2fimg-png%2fscissors-hd-png-scissors-png-image-2747.png&ehk=x5UBSsR62ca7d2NHGa4a8dPTNXMAA0R9C4gbEQQc7N0%3d&risl=&pid=ImgRaw&r=0"/>
        </div>
    </div>
    
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Computer</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">Play your next move</p>
    </div>

    <div class="target">
    <p id="tmsg">Target= 30</p>
    </div>

    <script src="RPS_script.js"></script>
</body>
</html>
